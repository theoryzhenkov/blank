<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blank — Settings</title>
  <link rel="icon" type="image/png" href="icons/icon-32.png">
  <link rel="stylesheet" href="fonts.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #FDFBF7;
      color: #333;
      line-height: 1.6;
      padding: 3rem 2rem;
      max-width: 560px;
      margin: 0 auto;
    }

    /* --- Section labels --- */
    .section-label {
      font-size: 0.75rem;
      font-weight: 500;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }

    .section + .section {
      margin-top: 2.5rem;
    }

    /* --- URL input --- */
    input[type="text"] {
      width: 100%;
      padding: 0.7rem 0.85rem;
      border: 1px solid #E0E0E0;
      border-radius: 8px;
      font-size: 0.875rem;
      font-family: inherit;
      background-color: white;
      color: #333;
      transition: border-color 0.3s ease;
      margin-bottom: 0.75rem;
    }

    input[type="text"]::placeholder {
      color: #bbb;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #A8E6CF;
    }

    .input-invalid {
      border-color: #FF6B6B !important;
      transition: border-color 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    /* --- URL list --- */
    .url-list {
      list-style: none;
    }

    .url-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.7rem 0.85rem;
      background-color: white;
      border: 1px solid #eee;
      border-radius: 8px;
      margin-bottom: 0.4rem;
    }

    .url-text {
      flex: 1;
      color: #555;
      font-size: 0.875rem;
    }

    .remove-btn {
      opacity: 0;
      padding: 0.1rem 0.3rem;
      background: none;
      border: none;
      color: #bbb;
      font-size: 1.25rem;
      cursor: pointer;
      border-radius: 50%;
      transition: background 0.2s, color 0.2s, opacity 0.15s;
      margin-left: 0.5rem;
      line-height: 1;
    }

    .url-item:hover .remove-btn,
    .url-item:focus-within .remove-btn,
    .remove-btn:focus-visible {
      opacity: 1;
    }

    .remove-btn:focus-visible {
      outline: 2px solid #A8E6CF;
      outline-offset: 2px;
    }

    .remove-btn:hover {
      background: #FFB6B6;
      color: #fff;
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #bbb;
      font-size: 0.875rem;
      font-style: italic;
    }

    /* --- Setting rows --- */
    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .setting-label {
      font-size: 0.875rem;
      color: #555;
    }

    /* --- Segmented button group --- */
    .segmented {
      display: flex;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #E0E0E0;
    }

    .segmented button {
      padding: 0.45rem 1.1rem;
      border: none;
      border-radius: 0;
      background: white;
      color: #555;
      font-size: 0.875rem;
      font-family: inherit;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
    }

    .segmented button + button {
      border-left: 1px solid #E0E0E0;
    }

    .segmented button:hover {
      background-color: #f5f5f3;
    }

    .segmented button.active {
      background-color: #A8E6CF;
      color: #333;
      font-weight: 500;
    }

    /* --- Toggle switch --- */
    .toggle {
      position: relative;
      display: inline-block;
      width: 44px;
      height: 24px;
      cursor: pointer;
      background: #ccc;
      border-radius: 12px;
      border: none;
      padding: 0;
      transition: background-color 0.3s ease;
    }

    .toggle[aria-checked="true"] {
      background: #A8E6CF;
    }

    .toggle::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 2px;
      width: 20px;
      height: 20px;
      background: white;
      border-radius: 50%;
      transition: transform 0.3s ease;
    }

    .toggle[aria-checked="true"]::after {
      transform: translateX(20px);
    }

    /* --- Dark mode --- */
    html.dark body {
      background-color: #1a1a1a;
      color: #ccc;
    }

    html.dark .section-label {
      color: #666;
    }

    html.dark input[type="text"] {
      background-color: #2a2a2a;
      border-color: #444;
      color: #ccc;
    }

    html.dark input[type="text"]::placeholder {
      color: #555;
    }

    html.dark input[type="text"]:focus {
      border-color: #2d6b4f;
    }

    html.dark .url-item {
      background-color: #2a2a2a;
      border-color: #3a3a3a;
    }

    html.dark .url-text {
      color: #aaa;
    }

    html.dark .remove-btn {
      color: #555;
    }

    html.dark .remove-btn:hover {
      background: #6b3333;
      color: #eee;
    }

    html.dark .empty-state {
      color: #555;
    }

    html.dark .setting-label {
      color: #aaa;
    }

    html.dark .segmented {
      border-color: #444;
    }

    html.dark .segmented button {
      background: #2a2a2a;
      color: #aaa;
      border-color: #444;
    }

    html.dark .segmented button + button {
      border-left-color: #444;
    }

    html.dark .segmented button:hover {
      background-color: #333;
    }

    html.dark .segmented button.active {
      background-color: #2d6b4f;
      color: #ccc;
    }

    html.dark .toggle {
      background: #555;
    }

    html.dark .toggle[aria-checked="true"] {
      background: #2d6b4f;
    }

    .input-hint {
      font-size: 0.75rem;
      color: #bbb;
      margin-top: -0.5rem;
      margin-bottom: 0.75rem;
    }

    html.dark .input-hint {
      color: #555;
    }
  </style>
</head>
<body>

  <div class="section">
    <p class="section-label">Protected sites</p>
    <input type="text" id="urlInput" placeholder="Add a site, e.g. twitter.com">
    <p class="input-hint">Press Enter to add</p>
    <ul id="urlList" class="url-list"></ul>
  </div>

  <div class="section">
    <p class="section-label">Preferences</p>

    <div class="setting-row">
      <span class="setting-label">Theme</span>
      <div class="segmented" id="themeGroup">
        <button data-theme="light">Light</button>
        <button data-theme="dark">Dark</button>
        <button data-theme="adaptive">Auto</button>
      </div>
    </div>

    <div class="setting-row">
      <span class="setting-label">Word count</span>
      <div class="segmented" id="wordCountGroup">
        <button data-count="3">3</button>
        <button data-count="5">5</button>
        <button data-count="7">7</button>
      </div>
    </div>

    <div class="setting-row">
      <span class="setting-label">Cooldown</span>
      <div class="segmented" id="cooldownGroup">
        <button data-cooldown="0">None</button>
        <button data-cooldown="5">5m</button>
        <button data-cooldown="10">10m</button>
        <button data-cooldown="30">30m</button>
        <button data-cooldown="60">60m</button>
      </div>
    </div>

    <div class="setting-row">
      <span class="setting-label" id="soundLabel">Typing sound</span>
      <button class="toggle" role="switch" aria-checked="false" aria-labelledby="soundLabel" id="soundToggle"></button>
    </div>
  </div>

  <script type="module" src="options.js"></script>
</body>
</html>
