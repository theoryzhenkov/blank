<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blank</title>
  <link rel="stylesheet" href="fonts.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      background: #f7f7f7;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .column-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100vw;
      height: 100vh;
      min-height: 100vh;
      justify-content: center;
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .waveform-canvas {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      opacity: 0.18;
      z-index: 0;
    }
    .words {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: row;
      flex-wrap: wrap;
      gap: 3rem;
      font-size: 3rem;
      font-weight: 600;
      max-width: calc(100vw - 8rem);
      justify-content: center;
      align-items: center;
      margin: 0 auto;
      padding: 2rem;
    }
    .word {
      display: flex;
      gap: 0.1em;
      letter-spacing: 0.05em;
    }
    .letter {
      color: #bbb;
      transition: color 0.3s ease;
    }
    .letter.active {
      color: var(--accent-color);
    }
    .letter.current {
      border-bottom: 2px solid var(--accent-color);
      color: #999;
    }
    .letter.wrong {
      animation: shake 0.3s ease;
      color: #FF6B6B;
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-3px); }
      40% { transform: translateX(3px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(2px); }
    }
    #typingHint {
      color: #b0b0b0;
      font-weight: 300;
      font-size: 1rem;
      letter-spacing: 0.15em;
      transition: opacity 0.4s ease;
      margin-top: 1.5rem;
    }

    html.dark, html.dark body {
      background: #1a1a1a;
    }
    html.dark .waveform-canvas {
      opacity: 0.25;
    }
    html.dark .letter {
      color: #505050;
    }
    html.dark .letter.active {
      color: var(--accent-color);
    }
    html.dark .letter.current {
      color: #777;
    }
    html.dark .letter.wrong {
      color: #FF6B6B;
    }
    html.dark #typingHint {
      color: #555;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="column-container">
    <canvas id="calmWaveform" class="waveform-canvas"></canvas>
    <div class="words" id="words" aria-label="Type the words to continue" tabindex="-1"></div>
    <div id="a11yStatus" aria-live="polite" class="sr-only"></div>
  </div>
  <script type="module" src="interstitial.js"></script>
</body>
</html>
